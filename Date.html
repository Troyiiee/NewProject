<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Date with me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="quiz-container">
    <h2>Do you want to go out with me?</h2>

    <div class="choice">
      <button class="btn yes" onclick="dateAnswer(this, true)">Yes</button>
      <button class="btn no" onclick="dateAnswer(this, false)">No</button>
    </div>

    <p id="date"></p>

    <!-- Calendar -->
    <div id="calendarBox" style="display:none;">
      <input type="date" id="datePick">
      <input type="time" id="timePick">

      <button class="btn" onclick="scheduleDate()">Confirm Date</button>

      <p id="result"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
