<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose an Activity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="information-page">
  <div class="choices">
    <h3 class="question"> Choose what type of date are you into right now? </h3>
    <div class="card" onclick="select(this, 'Coffee ☕')">☕ Coffee</div>
    <div class="card" onclick="select(this, 'Movies 🎬')">🎬 Movies</div>
    <div class="card" onclick="select(this, 'Food Trips 🍽️')">🍽️ Food Trips</div>
    <div class="card" onclick="select(this, 'Arcades 🎮')">🎮 Arcades</div>
  </div>
  <!-- Notification -->
<div id="toast"></div>
  <script src="script.js"></script>
  
</body>
</html>
